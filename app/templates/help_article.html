{% extends "base.html" %}

{% block title %}KeyCord - {{ article.title }}{% endblock %}

{% block extra_css %}
<style>
    .article-container {
        max-width: 800px;
        margin: 0 auto;
        padding: clamp(1rem, 5vw, 2rem);
    }

    .article-header {
        text-align: center;
        margin-bottom: 3rem;
        padding-bottom: 2rem;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
    }

    .article-content {
        font-family: 'Inter', sans-serif;
        /* Okunabilirlik için */
        font-size: 1.1rem;
        line-height: 1.8;
        color: var(--chalk);
    }

    .article-content h3 {
        font-family: 'Caveat', cursive;
        font-size: 1.8rem;
        margin-top: 2rem;
        margin-bottom: 1rem;
        color: var(--chalk);
    }

    .article-content p {
        margin-bottom: 1.5rem;
    }

    .article-content ol,
    .article-content ul {
        margin-bottom: 1.5rem;
        padding-left: 1.5rem;
    }

    .article-content li {
        margin-bottom: 0.5rem;
    }

    .feedback-section {
        margin-top: 4rem;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 12px;
        text-align: center;
        border: 1px dashed rgba(255, 255, 255, 0.1);
    }
</style>
{% endblock %}

{% block content %}
<div class="container article-container">

    <!-- Navigation -->
    <div style="margin-bottom: 2rem;">
        <a href="{{ url_for('auth.help_center') }}" class="btn"
            style="border-style: dashed; padding: 0.6rem 1.2rem; display: inline-flex; align-items: center; gap: 8px; font-family: 'Caveat', cursive; font-size: 1.2rem;">
            <i class="icon"
                style="background-color: currentColor; width: 16px; height: 16px; mask-image: url('data:image/svg+xml;charset=utf-8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path d=%22M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z%22/></svg>'); -webkit-mask-image: url('data:image/svg+xml;charset=utf-8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path d=%22M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z%22/></svg>'); mask-repeat: no-repeat; mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-size: contain;"></i>
            {{ _('Yardım Merkezine Dön') }}
        </a>
    </div>

    <!-- Article Header -->
    <div class="article-header">
        <h1
            style="font-family: 'Reenie Beanie', cursive; font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 0.5rem; line-height: 1;">
            {{ article.title }}
        </h1>
    </div>

    <!-- Article Content -->
    <div class="article-content">
        {{ article.content|safe }}
    </div>

    <!-- Feedback -->
    <div class="feedback-section sketch-box">
        <p style="font-family: 'Caveat', cursive; font-size: 1.4rem; margin-bottom: 1.5rem; color: var(--muted-chalk);">
            Bu makale yardımcı oldu mu?
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <button class="btn" onclick="alert('Geri bildiriminiz için teşekkürler! (Demo)')">👍 Evet</button>
            <button class="btn" style="opacity: 0.7;" onclick="alert('Geri bildiriminiz için teşekkürler! (Demo)')">👎
                Hayır</button>
        </div>
    </div>

</div>
{% endblock %}
