<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ _('Duyuru Oluştur - KeyCord') }}</title>
    <style>
        body {
            background: linear-gradient(120deg, #181a20 0%, #23272f 100%);
            color: #e5e5e5;
            margin: 0;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-title {
            font-size: 2.2em;
            color: #00c3ff;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .form-subtitle {
            color: #aaa;
            font-size: 1.1em;
        }

        .announcement-form {
            background: #23272f;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 32px #0008;
            border: 1px solid #333;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            color: #00c3ff;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #181a20;
            color: #e5e5e5;
            box-shadow: 0 2px 8px #0003 inset;
            transition: all 0.3s;
            box-sizing: border-box;
            font-size: 1.1em;
        }

        .form-input:focus {
            outline: none;
            border-color: #00c3ff;
            background: #1e2028;
            box-shadow: 0 0 0 3px #00c3ff22, 0 2px 8px #0003 inset;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .form-checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .form-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #333;
            background: #181a20;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-checkbox:checked {
            background: #00c3ff;
            border-color: #00c3ff;
        }

        .checkbox-label {
            color: #e5e5e5;
            cursor: pointer;
            font-size: 1.05em;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 32px;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c3ff 0%, #3a8dde 100%);
            color: #fff;
            box-shadow: 0 4px 16px #00c3ff44;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #3a8dde 0%, #00c3ff 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px #00c3ff55;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #555;
            color: #aaa;
        }

        .btn-secondary:hover {
            border-color: #00c3ff;
            color: #00c3ff;
            background: #00c3ff11;
        }

        .flash-messages {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
        }

        .flash-messages li {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .flash-messages .error {
            background: #ff475755;
            border: 1px solid #ff4757;
            color: #ff6b7a;
        }

        .flash-messages .success {
            background: #2ed57355;
            border: 1px solid #2ed573;
            color: #7bed9f;
        }

        /* Mobil responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }

            .announcement-form {
                padding: 24px 20px;
            }

            .form-title {
                font-size: 1.8em;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-header">
            <h1 class="form-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="10,8 16,12 10,16 10,8"></polygon>
                </svg>
                {{ _('Yeni Duyuru Oluştur') }}
            </h1>
            <p class="form-subtitle">{{ _('Tüm kullanıcılara gönderilecek duyuruyu oluşturun') }}</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-messages">
            {% for category, msg in messages %}
            <li class="{{ category }}">{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form class="announcement-form" method="POST">
            <div class="form-group">
                <label class="form-label" for="title">{{ _('Duyuru Başlığı') }}</label>
                <input type="text" id="title" name="title" class="form-input"
                    placeholder="{{ _('Duyuru başlığını buraya yazın...') }}" maxlength="200" required />
            </div>

            <div class="form-group">
                <label class="form-label" for="content">{{ _('Duyuru İçeriği') }}</label>
                <textarea id="content" name="content" class="form-input form-textarea"
                    placeholder="{{ _('Duyuru içeriğini buraya yazın...') }}" required></textarea>
            </div>

            <div class="form-group">
                <div class="form-checkbox-group">
                    <input type="checkbox" id="is_important" name="is_important" class="form-checkbox" />
                    <label for="is_important" class="checkbox-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 6px; vertical-align: middle;">
                            <polygon
                                points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26">
                            </polygon>
                        </svg>
                        {{ _('Bu duyuru önemli (öne çıkar)') }}
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('auth.announcements') }}" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    {{ _('İptal') }}
                </a>
                <button type="submit" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                        <line x1="4" y1="22" x2="4" y2="15"></line>
                    </svg>
                    {{ _('Duyuruyu Yayınla') }}
                </button>
            </div>
        </form>
    </div>
</body>

</html>
